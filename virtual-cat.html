<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Companion — Cat Lab</title>
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="cat.css" />
</head>
<body>
  <nav class="topnav">
    <a class="brand" href="index.html">🐾 Cat<span>Lab</span></a>
    <a class="back" href="index.html">← Back to Cat Lab</a>
  </nav>

  <!-- ADOPTION SCREEN -->
  <section id="adopt-screen">
    <header class="hero">
      <h1>🐱 Choose your companion</h1>
      <p class="tagline">Pick a cat to care for. Each one has its own temperament.</p>
    </header>
    <div id="adopt-grid" class="adopt-grid"></div>
  </section>

  <!-- CARE SCREEN -->
  <section id="care-screen" hidden>
    <div class="stage panel">
      <div class="stage-head">
        <div>
          <h1 id="cat-name">Cat</h1>
          <div id="cat-mood" class="mood">content</div>
        </div>
        <button id="switch-btn" class="ghost">Switch cat</button>
      </div>

      <div class="cat-wrap">
        <div id="cat-art"></div>
        <div id="speech" class="speech" hidden></div>
        <div id="fx" class="fx"></div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label"><span>🍗 Hunger</span><span id="v-hunger">–</span></div>
          <div class="bar"><div id="b-hunger" class="fill"></div></div>
        </div>
        <div class="stat">
          <div class="stat-label"><span>⚡ Energy</span><span id="v-energy">–</span></div>
          <div class="bar"><div id="b-energy" class="fill"></div></div>
        </div>
        <div class="stat">
          <div class="stat-label"><span>😊 Happiness</span><span id="v-happy">–</span></div>
          <div class="bar"><div id="b-happy" class="fill"></div></div>
        </div>
        <div class="stat">
          <div class="stat-label"><span>💛 Bond <em id="bond-tier"></em></span><span id="v-bond">–</span></div>
          <div class="bar"><div id="b-bond" class="fill bond"></div></div>
        </div>
      </div>

      <div class="actions">
        <button data-action="feed">🍗 Feed</button>
        <button data-action="treat">🐟 Treat</button>
        <button data-action="pet">✋ Pet</button>
        <button data-action="play">🧶 Play</button>
        <button data-action="brush">🪮 Brush</button>
        <button data-action="nap">😴 Nap</button>
        <button data-action="talk">💬 Talk</button>
      </div>
    </div>
  </section>

  <footer class="site">
    <p>Your cat lives in this browser and remembers how you treat it.</p>
  </footer>

  <script src="cat.js"></script>
</body>
</html>
